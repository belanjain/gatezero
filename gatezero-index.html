<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#030712">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gate Zero">
<link rel="manifest" href="manifest.json">
<title>Gate Zero</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&family=Noto+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #030712;
  --bg2: #070d1a;
  --bg3: #0a1225;
  --panel: #0d1830;
  --border: #1a3060;
  --border2: #2a4a8a;
  --cyan: #00d4ff;
  --cyan2: #80eaff;
  --blue: #2563eb;
  --blue2: #3b82f6;
  --violet: #7c3aed;
  --violet2: #8b5cf6;
  --red: #dc2626;
  --red2: #ef4444;
  --green: #16a34a;
  --green2: #22c55e;
  --gold: #f59e0b;
  --gold2: #fbbf24;
  --pink: #db2777;
  --pink2: #ec4899;
  --text: #e2e8f0;
  --text2: #64748b;
  --text3: #94a3b8;
  --rank-f: #64748b;
  --rank-e: #16a34a;
  --rank-d: #2563eb;
  --rank-c: #7c3aed;
  --rank-b: #f59e0b;
  --rank-a: #ea580c;
  --rank-s: #dc2626;
  --rank-ss: #db2777;
  --rank-sss: #00d4ff;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans', sans-serif;
  font-size: 15px;
  min-height: 100vh;
  overflow: hidden;
  position: relative;
}

/* Grid BG */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none; z-index: 0;
}

/* Scanline */
body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
  pointer-events: none; z-index: 0;
}

#particles { position: fixed; inset: 0; pointer-events: none; z-index: 1; overflow: hidden; }
.particle {
  position: absolute; width: 1px; height: 20px;
  background: linear-gradient(to bottom, transparent, var(--cyan));
  animation: fall linear infinite; opacity: 0;
}
@keyframes fall {
  0% { transform: translateY(-20px); opacity: 0; }
  10% { opacity: 0.6; }
  90% { opacity: 0.3; }
  100% { transform: translateY(100vh); opacity: 0; }
}

#app {
  position: relative; z-index: 2;
  max-width: 480px; margin: 0 auto;
  min-height: 100vh; display: flex; flex-direction: column;
}

.screen { display: none; flex-direction: column; min-height: 100vh; animation: fadeIn 0.35s ease; }
.screen.active { display: flex; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* ===== TYPOGRAPHY ===== */
.orbitron { font-family: 'Orbitron', monospace; }
.rajdhani { font-family: 'Rajdhani', sans-serif; }

/* ===== TITLE ===== */
#screen-title {
  background: radial-gradient(ellipse at 50% 30%, #0a1a3a 0%, #030712 70%);
  align-items: center; justify-content: center; text-align: center;
  padding: 40px 24px; gap: 0;
}
.title-gate {
  width: 100px; height: 100px; margin: 0 auto 20px;
  border: 2px solid var(--cyan);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 44px; position: relative;
  box-shadow: 0 0 30px var(--cyan), inset 0 0 30px rgba(0,212,255,0.1);
  animation: gateGlow 3s ease-in-out infinite;
}
@keyframes gateGlow {
  0%,100% { box-shadow: 0 0 20px var(--cyan), inset 0 0 20px rgba(0,212,255,0.1); }
  50% { box-shadow: 0 0 60px var(--cyan), inset 0 0 40px rgba(0,212,255,0.2); }
}
.title-gate::before {
  content: ''; position: absolute; inset: -8px;
  border: 1px solid rgba(0,212,255,0.3); border-radius: 50%;
  animation: spin 8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.game-title {
  font-family: 'Orbitron', monospace; font-weight: 900;
  font-size: 36px; letter-spacing: 4px;
  color: var(--cyan);
  text-shadow: 0 0 40px rgba(0,212,255,0.6);
  margin-bottom: 4px;
}
.game-sub {
  font-family: 'Rajdhani', sans-serif; font-size: 12px;
  letter-spacing: 6px; color: var(--text2);
  text-transform: uppercase; margin-bottom: 32px;
}
.title-divider {
  width: 200px; height: 1px; margin: 0 auto 32px;
  background: linear-gradient(to right, transparent, var(--cyan), transparent);
}
.title-flavor {
  font-style: italic; color: var(--text3);
  font-size: 13px; max-width: 280px; line-height: 1.7;
  margin-bottom: 40px;
}

/* ===== BUTTONS ===== */
.btn {
  display: block; width: 100%;
  padding: 13px 24px;
  background: linear-gradient(135deg, rgba(0,212,255,0.08), rgba(0,212,255,0.02));
  border: 1px solid var(--border2);
  border-radius: 2px;
  color: var(--cyan); cursor: pointer;
  font-family: 'Rajdhani', sans-serif; font-size: 15px;
  font-weight: 600; letter-spacing: 3px; text-transform: uppercase;
  transition: all 0.2s; text-align: center;
  margin-bottom: 10px; position: relative; overflow: hidden;
  clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
}
.btn::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(0,212,255,0.15), transparent);
  opacity: 0; transition: opacity 0.2s;
}
.btn:active { transform: scale(0.97); }
.btn:hover::before, .btn:active::before { opacity: 1; }
.btn.secondary { color: var(--text3); border-color: var(--border); background: transparent; }
.btn.danger { color: var(--red2); border-color: #4a1515; background: rgba(220,38,38,0.05); }
.btn.success { color: var(--green2); border-color: #154a15; background: rgba(34,197,94,0.05); }
.btn.violet { color: var(--violet2); border-color: #3a1a6a; background: rgba(124,58,237,0.08); }
.btn.small { padding: 8px 16px; font-size: 12px; margin-bottom: 6px; letter-spacing: 2px; }
.btn:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-row { display: flex; gap: 8px; }
.btn-row .btn { flex: 1; }

/* ===== CREATE CHARACTER ===== */
#screen-create { padding: 0; }
.create-header {
  background: linear-gradient(180deg, #0a1530, #070d1a);
  padding: 20px 20px 14px; border-bottom: 1px solid var(--border);
}
.create-header h2 {
  font-family: 'Orbitron', monospace; color: var(--cyan);
  font-size: 16px; margin-bottom: 4px; letter-spacing: 2px;
}
.step-dots { display: flex; gap: 6px; margin-top: 8px; }
.step-dot {
  width: 24px; height: 3px; background: var(--border);
  border-radius: 2px; transition: background 0.3s;
}
.step-dot.active { background: var(--cyan); }
.step-dot.done { background: var(--green2); }

.create-body { flex: 1; overflow-y: auto; padding: 20px; }
.create-footer { padding: 14px 20px; border-top: 1px solid var(--border); background: var(--bg2); }

.section-label {
  font-family: 'Rajdhani', sans-serif; font-size: 11px;
  letter-spacing: 3px; color: var(--text2);
  text-transform: uppercase; margin-bottom: 10px;
}

.input-field {
  width: 100%; padding: 12px 16px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 2px; color: var(--text);
  font-family: 'Rajdhani', sans-serif; font-size: 17px;
  font-weight: 500; letter-spacing: 1px;
  margin-bottom: 16px; outline: none; transition: border-color 0.2s;
}
.input-field:focus { border-color: var(--cyan); }

.card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
.select-card {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 4px; padding: 14px 10px;
  cursor: pointer; transition: all 0.2s; text-align: center;
}
.select-card:active { transform: scale(0.96); }
.select-card.selected {
  border-color: var(--cyan); background: rgba(0,212,255,0.05);
  box-shadow: 0 0 12px rgba(0,212,255,0.15);
}
.card-icon { font-size: 28px; margin-bottom: 6px; }
.card-name {
  font-family: 'Rajdhani', sans-serif; font-weight: 700;
  font-size: 14px; color: var(--cyan); display: block; margin-bottom: 3px;
}
.card-desc { font-size: 11px; color: var(--text3); line-height: 1.4; }
.card-bonus { font-size: 10px; color: var(--gold2); margin-top: 4px; font-family: 'Rajdhani', sans-serif; }

/* ===== HUD ===== */
#screen-game { padding: 0; }
.hud {
  background: linear-gradient(180deg, var(--bg3), var(--bg2));
  border-bottom: 1px solid var(--border); padding: 10px 14px 8px;
  display: flex; align-items: flex-start; gap: 10px;
  position: relative; overflow: hidden;
}
.hud::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(to right, transparent, var(--cyan), transparent);
}
.hud-avatar { font-size: 30px; flex-shrink: 0; margin-top: 2px; }
.hud-info { flex: 1; min-width: 0; }
.hud-name {
  font-family: 'Orbitron', monospace; font-size: 12px;
  color: var(--cyan2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-bottom: 1px;
}
.hud-meta { font-size: 10px; color: var(--text2); margin-bottom: 5px; font-family: 'Rajdhani', sans-serif; letter-spacing: 1px; }
.bar-row { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
.bar-label { font-size: 9px; color: var(--text2); width: 18px; flex-shrink: 0; font-family: 'Orbitron', monospace; }
.bar { flex: 1; height: 6px; background: #0a1020; border-radius: 0; overflow: hidden; border: 1px solid var(--border); }
.bar-fill { height: 100%; transition: width 0.4s ease; }
.bar-fill.hp { background: linear-gradient(to right, #7f1d1d, var(--red2)); }
.bar-fill.mp { background: linear-gradient(to right, #1e1b4b, var(--violet2)); }
.bar-fill.xp { background: linear-gradient(to right, #164e63, var(--cyan)); }
.bar-val { font-size: 9px; color: var(--text3); width: 40px; text-align: right; font-family: 'Orbitron', monospace; flex-shrink: 0; }
.hud-right { text-align: right; flex-shrink: 0; }
.hud-level-label { font-size: 8px; color: var(--text2); letter-spacing: 2px; font-family: 'Rajdhani', sans-serif; text-transform: uppercase; }
.hud-level { font-family: 'Orbitron', monospace; font-size: 16px; color: var(--cyan); line-height: 1; }
.hud-rank { font-family: 'Orbitron', monospace; font-size: 10px; margin-top: 3px; }
.hud-gold { font-size: 11px; color: var(--gold2); margin-top: 2px; font-family: 'Rajdhani', sans-serif; }

/* Nav */
.nav-tabs {
  display: flex; background: var(--bg2);
  border-bottom: 1px solid var(--border);
}
.nav-tab {
  flex: 1; padding: 9px 4px; background: none; border: none;
  color: var(--text2); font-size: 16px; cursor: pointer;
  transition: all 0.2s; border-bottom: 2px solid transparent;
  position: relative;
}
.nav-tab.active { color: var(--cyan); border-bottom-color: var(--cyan); }
.notif-dot {
  position: absolute; top: 4px; right: 8px;
  width: 7px; height: 7px; background: var(--red2); border-radius: 50%;
}

.game-content { flex: 1; overflow-y: auto; padding: 14px; }

/* ===== STORY ===== */
.location-bar {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 12px;
}
.location-bar .loc-text {
  font-family: 'Rajdhani', sans-serif; font-size: 10px;
  letter-spacing: 3px; color: var(--text2); text-transform: uppercase;
  flex: 1; text-align: center;
}
.loc-line { flex: 1; height: 1px; background: linear-gradient(to right, transparent, var(--border)); }
.loc-line.right { background: linear-gradient(to left, transparent, var(--border)); }

.story-box {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 4px; padding: 16px; margin-bottom: 12px;
  position: relative; overflow: hidden;
}
.story-box::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(to right, transparent, var(--border2), transparent);
}
.story-corner {
  position: absolute; top: 0; left: 0;
  width: 12px; height: 12px;
  border-top: 2px solid var(--cyan); border-left: 2px solid var(--cyan);
}
.story-corner.br {
  top: auto; left: auto; bottom: 0; right: 0;
  border-top: none; border-left: none;
  border-bottom: 2px solid var(--cyan); border-right: 2px solid var(--cyan);
}
.story-text { line-height: 1.8; color: var(--text); font-size: 14px; }
.story-text em { color: var(--cyan2); font-style: italic; }
.npc-name { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 13px; color: var(--gold2); display: block; margin-bottom: 2px; }
.npc-say { font-style: italic; color: #cbd5e1; font-size: 14px; }
.sys-msg {
  background: rgba(0,212,255,0.05); border: 1px solid rgba(0,212,255,0.2);
  border-radius: 4px; padding: 10px 14px; margin: 8px 0;
  font-family: 'Orbitron', monospace; font-size: 12px; color: var(--cyan2);
  text-align: center; letter-spacing: 1px;
}

.choices { display: flex; flex-direction: column; gap: 7px; }
.choice-btn {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 3px; padding: 11px 14px;
  color: var(--text); font-family: 'Noto Sans', sans-serif;
  font-size: 13px; cursor: pointer; transition: all 0.2s;
  text-align: left; line-height: 1.5;
  clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
}
.choice-btn:active { background: rgba(0,212,255,0.05); border-color: var(--cyan); transform: scale(0.98); }
.choice-prefix { color: var(--cyan); font-family: 'Rajdhani', sans-serif; font-size: 10px; letter-spacing: 2px; margin-bottom: 2px; display: block; }
.choice-btn.combat-choice { border-color: #4a1515; }
.choice-btn.combat-choice .choice-prefix { color: var(--red2); }
.choice-btn.romance-choice { border-color: #4a1540; }
.choice-btn.romance-choice .choice-prefix { color: var(--pink2); }
.choice-btn.system-choice { border-color: #1a3060; }
.choice-btn.system-choice .choice-prefix { color: var(--cyan); }

/* ===== COMBAT ===== */
.combat-wrap {
  background: linear-gradient(135deg, #0d0505, #150808);
  border: 1px solid #4a1515; border-radius: 4px; padding: 14px; margin-bottom: 12px;
}
.combat-header {
  font-family: 'Orbitron', monospace; font-size: 9px;
  letter-spacing: 4px; color: var(--red2); text-align: center; margin-bottom: 12px;
}
.enemy-display { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.enemy-sprite { font-size: 44px; animation: enemyFloat 2s ease-in-out infinite; }
@keyframes enemyFloat { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-4px);} }
.enemy-data { flex: 1; }
.enemy-name { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 16px; color: #fca5a5; }
.enemy-rank-badge {
  display: inline-block; padding: 1px 8px;
  font-family: 'Orbitron', monospace; font-size: 10px; border-radius: 2px; margin-bottom: 4px;
}
.combat-log {
  background: #0a0202; border: 1px solid #2a0a0a;
  border-radius: 3px; padding: 10px; font-size: 12px;
  line-height: 1.7; margin-bottom: 12px; max-height: 110px; overflow-y: auto;
  font-family: 'Rajdhani', sans-serif;
}
.log-player { color: var(--cyan2); }
.log-enemy { color: #fca5a5; }
.log-crit { color: #ff6060; font-weight: 700; }
.log-miss { color: var(--text2); font-style: italic; }
.log-heal { color: var(--green2); }
.log-system { color: var(--gold2); }
.log-skill { color: var(--violet2); }

.combat-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.action-btn {
  background: rgba(0,0,0,0.4); border: 1px solid var(--border);
  border-radius: 3px; padding: 10px 8px; cursor: pointer;
  color: var(--text3); font-family: 'Rajdhani', sans-serif;
  font-size: 13px; font-weight: 600; transition: all 0.2s;
  text-align: center; letter-spacing: 1px;
}
.action-btn:active { transform: scale(0.96); }
.action-btn.atk { border-color: #4a1515; color: var(--red2); }
.action-btn.skl { border-color: #3a1a6a; color: var(--violet2); }
.action-btn.itm { border-color: #164e63; color: var(--cyan); }
.action-btn.def { border-color: #1a3a1a; color: var(--green2); }
.action-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* ===== STATS ===== */
.stats-section { margin-bottom: 18px; }
.stats-title {
  font-family: 'Orbitron', monospace; font-size: 10px;
  letter-spacing: 3px; color: var(--cyan); text-transform: uppercase;
  margin-bottom: 10px; padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
.stats-title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(to right, var(--border), transparent); }

.stat-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 6px 0; border-bottom: 1px solid rgba(26,48,96,0.3);
}
.stat-name { font-size: 13px; color: var(--text3); font-family: 'Rajdhani', sans-serif; letter-spacing: 1px; }
.stat-val { font-family: 'Orbitron', monospace; font-size: 13px; color: var(--cyan2); }
.stat-val.up { color: var(--green2); }

/* Star display */
.star-display { display: flex; gap: 3px; margin: 12px 0; justify-content: center; }
.star { font-size: 20px; transition: all 0.3s; }
.star.lit { filter: drop-shadow(0 0 6px var(--gold)); }
.star.dim { filter: grayscale(1) opacity(0.3); }

.class-display {
  background: rgba(0,212,255,0.05); border: 1px solid var(--border2);
  border-radius: 4px; padding: 14px; text-align: center; margin-bottom: 14px;
}
.class-icon-big { font-size: 48px; margin-bottom: 6px; }
.class-name-big {
  font-family: 'Orbitron', monospace; font-size: 16px;
  color: var(--cyan); letter-spacing: 2px;
}
.class-rank-line { font-family: 'Rajdhani', sans-serif; font-size: 12px; color: var(--text2); margin-top: 4px; letter-spacing: 2px; }

.upgrade-banner {
  background: linear-gradient(135deg, rgba(124,58,237,0.15), rgba(0,212,255,0.05));
  border: 1px solid var(--violet); border-radius: 4px;
  padding: 12px; margin-bottom: 14px; text-align: center;
}
.upgrade-banner h3 { font-family: 'Orbitron', monospace; color: var(--violet2); font-size: 13px; margin-bottom: 4px; }
.upgrade-banner p { font-size: 12px; color: var(--text3); }

/* ===== INVENTORY ===== */
.item-list { display: flex; flex-direction: column; gap: 7px; margin-bottom: 14px; }
.item-card {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 3px; padding: 11px 12px;
  display: flex; align-items: center; gap: 10px;
  cursor: pointer; transition: all 0.2s;
}
.item-card:active { background: rgba(0,212,255,0.04); border-color: var(--border2); }
.item-icon { font-size: 22px; flex-shrink: 0; }
.item-info { flex: 1; min-width: 0; }
.item-name { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 14px; color: var(--cyan2); margin-bottom: 1px; }
.item-desc { font-size: 11px; color: var(--text3); }
.item-stat { font-size: 11px; color: var(--green2); font-family: 'Orbitron', monospace; font-size: 10px; margin-top: 2px; }
.item-qty { font-family: 'Orbitron', monospace; font-size: 12px; color: var(--text2); flex-shrink: 0; }
.rarity-common { color: var(--text2); }
.rarity-uncommon { color: var(--green2); }
.rarity-rare { color: var(--blue2); }
.rarity-epic { color: var(--violet2); }
.rarity-legendary { color: var(--gold2); }
.eq-badge { font-size: 9px; color: var(--green2); letter-spacing: 1px; font-family: 'Orbitron', monospace; }

/* ===== DUNGEON LOG ===== */
.gate-card {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 4px; padding: 14px; margin-bottom: 10px;
  display: flex; align-items: center; gap: 12px;
  cursor: pointer; transition: all 0.2s;
}
.gate-card:active { transform: scale(0.98); }
.gate-rank-badge {
  width: 44px; height: 44px; border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Orbitron', monospace; font-weight: 900; font-size: 14px;
  flex-shrink: 0; border: 2px solid;
}
.gate-info { flex: 1; }
.gate-name { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 15px; color: var(--text); margin-bottom: 2px; }
.gate-desc { font-size: 11px; color: var(--text3); }
.gate-cleared { font-size: 10px; color: var(--green2); font-family: 'Orbitron', monospace; }

/* ===== ROMANCE ===== */
.npc-card {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 4px; padding: 14px; margin-bottom: 12px;
  display: flex; gap: 12px; align-items: flex-start;
}
.npc-avatar { font-size: 36px; flex-shrink: 0; }
.npc-data { flex: 1; }
.npc-name-r { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 16px; color: var(--pink2); }
.npc-role { font-size: 11px; color: var(--text2); margin-bottom: 6px; letter-spacing: 1px; }
.affinity-bar { height: 5px; background: var(--bg3); border-radius: 0; overflow: hidden; border: 1px solid var(--border); margin-bottom: 3px; }
.affinity-fill { height: 100%; background: linear-gradient(to right, var(--pink), #ff80b0); transition: width 0.5s; }
.affinity-status { font-family: 'Orbitron', monospace; font-size: 9px; color: var(--text2); }

/* ===== MODAL ===== */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.88); z-index: 100;
  align-items: flex-end; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg2); border: 1px solid var(--border2);
  border-top: 2px solid var(--cyan);
  width: 100%; max-width: 480px;
  padding: 20px; max-height: 80vh; overflow-y: auto;
  animation: slideUp 0.3s ease;
}
@keyframes slideUp { from{transform:translateY(100%);} to{transform:translateY(0);} }
.modal-title { font-family: 'Orbitron', monospace; color: var(--cyan); font-size: 14px; margin-bottom: 14px; letter-spacing: 2px; }
.modal-close { float: right; background: none; border: none; color: var(--text2); font-size: 20px; cursor: pointer; margin-top: -4px; }

/* ===== TOAST ===== */
#toast {
  position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%);
  background: var(--bg3); border: 1px solid var(--cyan);
  border-radius: 2px; padding: 8px 20px;
  font-family: 'Rajdhani', sans-serif; font-size: 13px; color: var(--cyan2);
  z-index: 200; opacity: 0; pointer-events: none;
  transition: opacity 0.3s; white-space: nowrap; letter-spacing: 1px;
  box-shadow: 0 0 20px rgba(0,212,255,0.2);
  clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
}
#toast.show { opacity: 1; }

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 0; }

.rank-badge {
  display: inline-block; padding: 1px 8px; border-radius: 2px;
  font-family: 'Orbitron', monospace; font-size: 10px; font-weight: 700;
}
.rank-F { background: rgba(100,116,139,0.2); color: var(--rank-f); border: 1px solid var(--rank-f); }
.rank-E { background: rgba(22,163,74,0.15); color: var(--rank-e); border: 1px solid var(--rank-e); }
.rank-D { background: rgba(37,99,235,0.15); color: var(--rank-d); border: 1px solid var(--rank-d); }
.rank-C { background: rgba(124,58,237,0.15); color: var(--rank-c); border: 1px solid var(--rank-c); }
.rank-B { background: rgba(245,158,11,0.15); color: var(--rank-b); border: 1px solid var(--rank-b); }
.rank-A { background: rgba(234,88,12,0.15); color: var(--rank-a); border: 1px solid var(--rank-a); }
.rank-S { background: rgba(220,38,38,0.2); color: var(--rank-s); border: 1px solid var(--rank-s); }
.rank-SS { background: rgba(219,39,119,0.2); color: var(--rank-ss); border: 1px solid var(--rank-ss); }
.rank-SSS { background: rgba(0,212,255,0.15); color: var(--rank-sss); border: 1px solid var(--rank-sss); }

.empty-state { text-align: center; color: var(--text2); font-style: italic; padding: 30px; font-family: 'Rajdhani', sans-serif; }
</style>
</head>

    level: 1, xp: 0, xpNext: 100,

function selectGender(g) { createData.gender = g; renderCreateStep(); }
function selectClass(id) { createData.class = id; renderCreateStep(); }
function createBack() { createStep--; renderCreateStep(); }
function createNext() {
  if(createStep===0) {
    const n = document.getElementById('name-input')?.value.trim();
    if(!n) { showToast('Masukkan nama dulu!'); return; }
    createData.name = n;
  } else if(createStep===1 && !createData.gender) {
    showToast('Pilih gender dulu!'); return;
  } else if(createStep===2 && !createData.class) {
    showToast('Pilih class dulu!'); return;
  }
  createStep++; renderCreateStep();
}
function finishCreate() {
  if(!createData.class) { showToast('Pilih class dulu!'); return; }
  G.player = makePlayer(createData.name, createData.class, createData.gender);
  G.scene = 'prologue'; G.sceneStep = 0;
  G.romanceFlags = { kira:0, ren:0, nyx:0, lance:0 };
  G.flags = {}; G.dungeonLog = [];
  initGame();
}

// ============================================================
// SAVE / LOAD — Slot System
// ============================================================
const SAVE_SLOTS = 3;

function getSaveKey(slot) { return `gatezero_save_${slot}`; }

function saveGame(slot=1) {
  const data = { ...G, savedAt: new Date().toLocaleString('id-ID'), scene: G.scene, level: G.player?.level, name: G.player?.name };
  localStorage.setItem(getSaveKey(slot), JSON.stringify(data));
  showToast(`💾 Tersimpan di Slot ${slot}`);
  closeModal('save-modal');
}

function loadGame(slot=1) {
  const s = localStorage.getItem(getSaveKey(slot));
  if(!s) { showToast('Slot kosong.'); return; }
  G = JSON.parse(s);
  closeModal('save-modal');
  initGame();
}

function deleteSave(slot) {
  localStorage.removeItem(getSaveKey(slot));
  showToast(`🗑️ Slot ${slot} dihapus`);
  openSaveMenu();
}

function openSaveMenu() {
  const body = document.getElementById('modal-save-body');
  let html = '';
  for(let i=1; i<=SAVE_SLOTS; i++) {
    const raw = localStorage.getItem(getSaveKey(i));
    const data = raw ? JSON.parse(raw) : null;
    html += `
      <div style="background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:12px;margin-bottom:10px">
        <div style="font-family:'Orbitron',monospace;font-size:11px;color:var(--cyan);margin-bottom:6px">SLOT ${i}</div>
        ${data ? `
          <div style="font-size:13px;color:var(--text);margin-bottom:2px">${data.name||'???'} — Lv.${data.level||1}</div>
          <div style="font-size:10px;color:var(--text2);margin-bottom:8px;font-family:'Rajdhani',sans-serif">${data.savedAt||'—'} | Scene: ${data.scene||'—'}</div>
          <div style="display:flex;gap:6px">
            <button class="btn small" style="flex:1" onclick="saveGame(${i})">💾 Overwrite</button>
            <button class="btn small success" style="flex:1" onclick="loadGame(${i})">▶ Load</button>
            <button class="btn small danger" style="flex:0 0 auto;padding:8px 10px" onclick="deleteSave(${i})">🗑️</button>
          </div>
        ` : `
          <div style="font-size:12px;color:var(--text2);font-style:italic;margin-bottom:8px">— Kosong —</div>
          <button class="btn small" onclick="saveGame(${i})">💾 Simpan di sini</button>
        `}
      </div>`;
  }
  // Quick load from old single save (backward compat)
  const oldSave = localStorage.getItem('gatezero_save');
  if(oldSave) {
    html += `<div style="font-size:11px;color:var(--text2);text-align:center;margin-top:8px;font-family:'Rajdhani',sans-serif">
      Save lama terdeteksi — <button onclick="migrateOldSave()" style="background:none;border:none;color:var(--cyan);cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:11px;text-decoration:underline">Import ke Slot 1</button>
    </div>`;
  }
  body.innerHTML = html;
  document.getElementById('save-modal').classList.add('open');
}

function migrateOldSave() {
  const s = localStorage.getItem('gatezero_save');
  if(!s) return;
  const data = JSON.parse(s);
  data.savedAt = 'Imported';
  localStorage.setItem(getSaveKey(1), JSON.stringify(data));
  localStorage.removeItem('gatezero_save');
  showToast('Save lama dipindah ke Slot 1!');
  openSaveMenu();
}

function switchTab(t) {
  G.tab = t;
  ['story','status','inventory','romance'].forEach(tab=>{
    document.getElementById('tab-'+tab+'-content').style.display=tab===t?'block':'none';
    document.getElementById('tab-'+tab).classList.toggle('active',tab===t);
  });
  if(t==='status') renderStatus();
  if(t==='inventory') renderInventory();
  if(t==='romance') renderRomance();
  if(t==='story') renderStory();
}

// ============================================================
// STORY ENGINE
// ============================================================
function renderStory() {
  const el = document.getElementById('tab-story-content');
  if(!el) return;
  if(G.combat) { renderCombat(el); return; }

  // Romance branch — arah ke route berdasarkan gender + affinity tertinggi
  if(G.scene==='romance_branch') {
    const pg = G.player?.gender||'m';
    const rf = G.romanceFlags;
    const top = Object.entries(rf).sort((a,b)=>b[1]-a[1])[0];
    const npc = NPCS.find(n=>n.id===top[0]);
    const sameGender = npc?.gender === pg;
    G.scene = sameGender ? 'friend_'+top[0] : 'romance_'+top[0];
    G.sceneStep=0;
    renderStory(); return;
  }

  // Check lose scene
  const loseScene = LOSE_SCENES[G.scene];
  if(loseScene) {
    if(!G.flags['lose_visited_'+G.scene]) {
      G.flags['lose_visited_'+G.scene]=true;
      loseScene.onEnter&&loseScene.onEnter();
    }
    el.innerHTML = buildStoryHTML(loseScene.loc, loseScene.text, loseScene.choices);
    return;
  }

  const arr = SCENES[G.scene];
  if(!arr) { el.innerHTML=`<div class="empty-state">Scene tidak ditemukan: ${G.scene}</div>`; return; }
  const scene = arr[G.sceneStep]||arr[0];

  if(scene.combat) { startCombat(G.scene, el); return; }

  if(scene.onEnter && !G.flags['visit_'+G.scene+'_'+G.sceneStep]) {
    G.flags['visit_'+G.scene+'_'+G.sceneStep]=true;
    scene.onEnter();
  }

  const textContent = typeof scene.text === 'function' ? scene.text() : scene.text;
  el.innerHTML = buildStoryHTML(scene.loc, textContent, scene.choices);
}

function buildStoryHTML(loc, text, choices) {
  return `
    <div class="location-bar"><div class="loc-line"></div><div class="loc-text">${loc}</div><div class="loc-line right"></div></div>
    <div class="story-box">
      <div class="story-corner"></div>
      <div class="story-corner br"></div>
      <div class="story-text">${text}</div>
    </div>
    <div class="choices">
      ${choices.map((c,i)=>`
        <button class="choice-btn ${c.type==='combat'?'combat-choice':''} ${c.rom?'romance-choice':''} ${c.type==='grind'?'system-choice':''}"
          onclick="chooseOption(${i})">
          <span class="choice-prefix">${c.rom?'💕 ROMANCE — ':c.type==='combat'?'⚔️ COMBAT — ':c.type==='grind'?'◈ DUNGEON — ':'▶ '}</span>
          ${c.icon||''} ${c.text}
        </button>`).join('')}
    </div>
    <div style="margin-top:14px"><button class="btn secondary small" onclick="openSaveMenu()">💾 SAVE</button></div>
  `;
}

function chooseOption(idx) {
  const arr = SCENES[G.scene]; if(!arr) return;
  const scene = arr[G.sceneStep]||arr[0];
  const choice = scene.choices[idx]; if(!choice) return;
  if(choice.rom && choice.romVal) {
    G.romanceFlags[choice.rom]=(G.romanceFlags[choice.rom]||0)+choice.romVal;
    const npc = NPCS.find(n=>n.id===choice.rom);
    showToast(`💕 ${npc?.name} +${choice.romVal}`);
  }
  if(choice.action==='save') { openSaveMenu(); return; }
  if(choice.action==='stats') { switchTab('status'); return; }
  if(choice.next) { G.scene=choice.next; G.sceneStep=0; G.combat=null; renderStory(); }
}

function openTitleLoadMenu() {
  const body = document.getElementById('modal-save-body');
  let html = '<p style="font-size:12px;color:var(--text3);margin-bottom:12px;font-family:Rajdhani,sans-serif">Pilih slot untuk dilanjutkan:</p>';
  let hasAny = false;
  for(let i=1; i<=SAVE_SLOTS; i++) {
    const raw = localStorage.getItem(getSaveKey(i));
    const data = raw ? JSON.parse(raw) : null;
    if(!data) continue;
    hasAny = true;
    html += `
      <div style="background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:12px;margin-bottom:10px">
        <div style="font-family:'Orbitron',monospace;font-size:11px;color:var(--cyan);margin-bottom:4px">SLOT ${i}</div>
        <div style="font-size:13px;color:var(--text);margin-bottom:2px">${data.name||'???'} — Lv.${data.level||1}</div>
        <div style="font-size:10px;color:var(--text2);margin-bottom:8px;font-family:'Rajdhani',sans-serif">${data.savedAt||'—'}</div>
        <button class="btn small success" onclick="loadGame(${i})">▶ Lanjutkan</button>
      </div>`;
  }
  const oldSave = localStorage.getItem('gatezero_save');
  if(oldSave) {
    hasAny = true;
    html += `<div style="background:var(--bg3);border:1px solid #3a3010;border-radius:4px;padding:12px;margin-bottom:10px">
      <div style="font-family:'Orbitron',monospace;font-size:11px;color:var(--gold2);margin-bottom:4px">SAVE LAMA</div>
      <button class="btn small success" onclick="migrateAndLoad()">▶ Import & Lanjutkan</button>
    </div>`;
  }
  if(!hasAny) html += `<div class="empty-state">Tidak ada save file. Mulai New Game dulu.</div>`;
  body.innerHTML = html;
  document.getElementById('save-modal').classList.add('open');
}

function migrateAndLoad() {
  const s = localStorage.getItem('gatezero_save');
  if(!s) return;
  const data = JSON.parse(s);
  data.savedAt = 'Imported';
  localStorage.setItem(getSaveKey(1), JSON.stringify(data));
  localStorage.removeItem('gatezero_save');
  loadGame(1);
}

// ============================================================
// COMBAT
// ============================================================
function startCombat(sceneId, el) {
  const cm = COMBAT_MAP[sceneId]; if(!cm) return;
  let e = JSON.parse(JSON.stringify(ENEMIES[cm.enemy]));
  if(G.flags.ss_analyze && cm.enemy==='gate_ss_boss') { e.def -= 8; }
  G.combat = { sceneId, enemy:e, log:[`<span class="log-system">[ COMBAT STARTED: ${e.name} ]</span>`], ended:false };
  // BGM: boss music for SS/SSS rank, combat for the rest
  const bossRanks = ['SS','SSS'];
  if(bossRanks.includes(e.rank)) playBGM('bgm-boss', 0.5);
  else playBGM('bgm-combat', 0.5);
  renderCombat(el);
}

function renderCombat(el) {
  const c = G.combat; if(!c) return;
  const p = G.player; const e = c.enemy;
  const hpPct = Math.max(0,(e.hp/e.maxHp)*100);
  const rankColor = `var(--rank-${e.rank})`;
  el.innerHTML = `
    <div class="combat-wrap">
      <div class="combat-header">◈ COMBAT INITIATED ◈</div>
      <div class="enemy-display">
        <div class="enemy-sprite">${e.icon}</div>
        <div class="enemy-data">
          <div><span class="rank-badge rank-${e.rank}">${e.rank}</span></div>
          <div class="enemy-name">${e.name}</div>
          <div class="bar-row" style="margin-top:6px">
            <span class="bar-label">HP</span>
            <div class="bar"><div class="bar-fill hp" style="width:${hpPct}%"></div></div>
            <span class="bar-val">${e.hp}/${e.maxHp}</span>
          </div>
        </div>
      </div>
      <div class="combat-log" id="clog">${c.log.slice(-6).map(l=>`<div>${l}</div>`).join('')}</div>
      ${!c.ended ? `
        <div class="combat-actions">
          <button class="action-btn atk" onclick="doAction('atk')">⚔️ ATTACK</button>
          <button class="action-btn skl" onclick="doAction('skl')" ${p.mp<20?'disabled':''}>✨ SKILL<br><span style="font-size:10px">(20 MP)</span></button>
          <button class="action-btn itm" onclick="doAction('itm')">🧪 ITEM</button>
          <button class="action-btn def" onclick="doAction('def')">🛡️ DEFEND</button>
        </div>` : `<button class="btn" onclick="combatEnd()">CONTINUE ▶</button>`}
    </div>`;
  const cl = document.getElementById('clog');
  if(cl) cl.scrollTop = cl.scrollHeight;
}

function doAction(act) {
  const c = G.combat; const p = G.player; const e = c.enemy;
  if(c.ended) return;
  let tempDef = p.def + (ITEMS[p.equipped?.armor]?.stat?.def||0);

  if(act==='atk') {
    const weapStat = ITEMS[p.equipped?.weapon]?.stat||{};
    const totalAtk = p.atk + (weapStat.atk||0);
    const totalCrit = p.crit + (weapStat.crit||0);
    const isCrit = Math.random()*100 < totalCrit;
    const isMiss = Math.random()*100 < Math.max(0, (e.dodge||3));
    if(isMiss) c.log.push(`<span class="log-miss">Miss — serangan tidak mengenai.</span>`);
    else {
      let dmg = Math.max(1, totalAtk - e.def + (isCrit?Math.floor(totalAtk*0.6):0));
      c.log.push(isCrit
        ? `<span class="log-crit">💥 CRITICAL! ${p.name} → ${dmg} DMG!</span>`
        : `<span class="log-player">⚔️ ${p.name} → ${dmg} DMG</span>`);
      e.hp = Math.max(0, e.hp-dmg);
    }
  } else if(act==='skl') {
    if(p.mp<20) { showToast('MP tidak cukup!'); return; }
    p.mp-=20; updateHUD();
    const isMatk = ['mage','healer'].includes(p.class);
    const weapStat = ITEMS[p.equipped?.weapon]?.stat||{};
    const base = isMatk ? p.matk+(weapStat.matk||0) : p.atk+(weapStat.atk||0);
    const dmg = Math.max(5, Math.floor(base*2.0)-Math.floor(e.def*0.5));
    c.log.push(`<span class="log-skill">✨ SPECIAL SKILL: ${dmg} DMG!</span>`);
    e.hp = Math.max(0, e.hp-dmg);
  } else if(act==='itm') {
    const pot = p.inventory?.find(s=>s.id==='hp_potion'&&s.qty>0);
    if(!pot) { showToast('Tidak ada HP Potion!'); return; }
    pot.qty--; if(pot.qty<=0) p.inventory=p.inventory.filter(s=>s!==pot);
    const h=40; p.hp=Math.min(p.maxHp,p.hp+h);
    c.log.push(`<span class="log-heal">🧪 HP +${h}</span>`);
    updateHUD(); renderInventory();
  } else if(act==='def') {
    tempDef = Math.floor(tempDef*1.6);
    c.log.push(`<span class="log-system">🛡️ DEFEND — DEF ↑</span>`);
  }

  if(e.hp<=0) {
    c.log.push(`<span class="log-system">[ ${e.name} DEFEATED ]</span>`);
    c.ended=true;
    if(e.loot) e.loot.forEach(id=>{ if(Math.random()>0.35){ addItem(id,1); c.log.push(`<span class="log-heal">◈ DROP: ${ITEMS[id]?.name||id}</span>`); }});
    p.gold+=e.gold||0;
    c.log.push(`<span class="log-heal">💎 +${e.gold} Gold</span>`);
    gainXP(e.xp||0, true);
    G.dungeonLog.push({ name:e.name, rank:e.rank, xp:e.xp, gold:e.gold });
    G.flags.ss_analyze=false;
    renderCombat(document.getElementById('tab-story-content'));
    updateHUD(); return;
  }

  // enemy turn
  setTimeout(()=>{
    const eDmg = Math.max(1, (e.atk||10) - tempDef);
    const eDodge = Math.random()*100 < p.dodge;
    if(eDodge) c.log.push(`<span class="log-system">DODGE!</span>`);
    else {
      p.hp = Math.max(0, p.hp-eDmg);
      c.log.push(`<span class="log-enemy">💢 ${e.name} → ${eDmg} DMG</span>`);
    }
    updateHUD();
    if(p.hp<=0) {
      p.hp=1; c.log.push(`<span class="log-enemy">[ HP CRITICAL ]</span>`);
      c.ended=true;
      const loseKey='lose_'+c.sceneId.replace('combat_','');
      G.combat=null;
      G.scene=loseKey; G.sceneStep=0;
      playBGM('bgm-dungeon');
      renderStory(); return;
    }
    renderCombat(document.getElementById('tab-story-content'));
  },600);
}

function combatEnd() {
  const c=G.combat; const cm=COMBAT_MAP[c.sceneId];
  G.combat=null; G.scene=cm.win; G.sceneStep=0;
  playBGM('bgm-dungeon');
  renderStory();
}

// XP & LEVEL
// ============================================================
function gainXP(amt, silent) {
  const p=G.player;
  if(p.class==='irregular') amt=Math.floor(amt*1.05);
  p.xp+=amt;
  if(!silent) showToast(`+${amt} XP`);
  else showToast(`+${amt} XP`);
  while(p.xp>=p.xpNext) levelUp();
  updateHUD();
}

function levelUp() {
  const p=G.player;
  p.level++; p.xp-=p.xpNext; p.xpNext=Math.floor(p.xpNext*1.45);
  p.statPoints=(p.statPoints||0)+3;
  const hpG=12+Math.floor(p.vit/2); const mpG=6+Math.floor(p.int/3);
  p.maxHp+=hpG; p.maxMp+=mpG; p.hp=p.maxHp; p.mp=p.maxMp;
  p.atk+=2; p.def+=1; p.matk+=2;
  // rank up
  const rankThresholds={2:'E',5:'D',10:'C',18:'B',28:'A',40:'S',55:'SS',70:'SSS'};
  if(rankThresholds[p.level]) { p.hunterRank=rankThresholds[p.level]; showToast(`🎉 RANK UP: ${p.hunterRank}!`); }
  showToast(`⬆️ LEVEL ${p.level}! +3 Stat Points`);
  // check star upgrade available
  checkStarUpgrade();
  updateHUD();
}

function checkStarUpgrade() {
  const p=G.player;
  const cp=CLASS_PATHS[p.class];
  const nextStar=cp.stars[p.star];
  if(!nextStar) return;
  const req=nextStar.req;
  if(!req) return;
  const hasLevel=p.level>=req.level;
  const hasMat=req.mat&&(p.materials[req.mat]||0)>=1;
  if(hasLevel&&hasMat) {
    G.flags.can_star_up=true;
    document.getElementById('inv-dot').style.display='block';
    showToast(`⭐ Star Upgrade tersedia!`);
  }
}

function addStat(s) {
  const p=G.player; if(!p.statPoints) return;
  p[s]++; p.statPoints--;
  if(s==='str'){p.atk+=2;}
  if(s==='vit'){p.maxHp+=8;p.hp=Math.min(p.hp+8,p.maxHp);p.def+=1;}
  if(s==='int'){p.maxMp+=5;p.matk+=2;}
  if(s==='agi'){p.crit+=2;if(p.agi%4===0)p.dodge+=2;}
  updateHUD(); renderStatus();
}

// Star Upgrade
function openStarUpgrade() {
  const p=G.player;
  const cp=CLASS_PATHS[p.class];
  const next=cp.stars[p.star];
  if(!next) { showToast('Sudah max star!'); return; }
  const req=next.req;
  const hasLv=p.level>=req.level;
  const matCount=p.materials[req.mat]||0;
  const hasMat=matCount>=1;

  document.getElementById('modal-class-body').innerHTML=`
    <div style="text-align:center;margin-bottom:16px">
      <div style="font-size:40px">${cp.stars[p.star-1].icon} → ${next.icon}</div>
      <div style="font-family:'Orbitron',monospace;font-size:14px;color:var(--cyan);margin-top:8px">${cp.stars[p.star-1].name} → ${next.name}</div>
      ${next.awakened?'<div style="color:var(--gold2);font-size:12px;margin-top:4px">⭐ AWAKENED CLASS</div>':''}
    </div>
    <div class="stat-row"><span class="stat-name">Level</span><span class="stat-val ${hasLv?'up':''}">${p.level}/${req.level} ${hasLv?'✓':'✗'}</span></div>
    <div class="stat-row"><span class="stat-name">${MAT_NAMES[req.mat]||req.mat}</span><span class="stat-val ${hasMat?'up':''}">${matCount}/1 ${hasMat?'✓':'✗'}</span></div>
    ${Object.entries(next.bonus||{}).map(([k,v])=>`<div class="stat-row"><span class="stat-name">${k.toUpperCase()}</span><span class="stat-val up">+${v}</span></div>`).join('')}
    <div style="margin-top:14px">
      <button class="btn violet" ${!hasLv||!hasMat?'disabled':''} onclick="doStarUp()">⭐ UPGRADE</button>
    </div>
  `;
  document.getElementById('class-modal').classList.add('open');
}

function doStarUp() {
  const p=G.player;
  const cp=CLASS_PATHS[p.class];
  const next=cp.stars[p.star];
  if(!next) return;
  const req=next.req;
  if(p.level<req.level||(p.materials[req.mat]||0)<1) { showToast('Syarat belum terpenuhi!'); return; }
  p.materials[req.mat]--;
  p.star++;
  p.starName=next.name;
  const bonus=next.bonus||{};
  Object.entries(bonus).forEach(([k,v])=>{ if(p[k]!==undefined) p[k]+=v; });
  if(bonus.vit) { p.maxHp+=bonus.vit*5; p.hp=p.maxHp; }
  if(bonus.int) { p.maxMp+=bonus.int*3; p.mp=p.maxMp; }
  G.flags.can_star_up=false;
  document.getElementById('inv-dot').style.display='none';
  closeModal('class-modal');
  showToast(`⭐ ${next.name} — UNLOCKED!`);
  updateHUD(); renderStatus();
}

// INVENTORY
// ============================================================
function renderInventory() {
  const p=G.player; if(!p) return;
  const el=document.getElementById('tab-inventory-content');
  const sections={ consumable:{label:'Consumables',items:[]}, weapon:{label:'Weapons',items:[]}, armor:{label:'Armor',items:[]}, material:{label:'Materials',items:[]}, key:{label:'Key Items',items:[]} };
  p.inventory?.forEach(slot=>{ const item=ITEMS[slot.id]; if(!item) return; (sections[item.type]||sections.key).items.push({...slot,item}); });
  // add materials
  Object.entries(p.materials||{}).forEach(([id,qty])=>{
    if(qty<=0) return;
    const item=ITEMS[id]; if(!item) return;
    sections.material.items.push({id,qty,item});
  });

  let html=`<div style="font-size:13px;color:var(--text3);margin-bottom:12px;font-family:'Rajdhani',sans-serif">💎 Gold: <span style="color:var(--gold2)">${p.gold}</span></div>`;
  Object.values(sections).forEach(sec=>{
    if(!sec.items.length) return;
    html+=`<div class="stats-title">${sec.label}</div><div class="item-list">`;
    sec.items.forEach(slot=>{
      const item=slot.item;
      const eq=(p.equipped?.weapon===slot.id||p.equipped?.armor===slot.id);
      html+=`<div class="item-card" onclick="openItem('${slot.id}')">
        <div class="item-icon">${item.icon}</div>
        <div class="item-info">
          <div class="item-name">${item.name} ${eq?'<span class="eq-badge">[EQ]</span>':''}</div>
          <div class="item-desc">${item.desc}</div>
          ${item.stat?`<div class="item-stat">${Object.entries(item.stat).map(([k,v])=>`${k.toUpperCase()}+${v}`).join(' | ')}</div>`:''}
          <span class="rarity-${item.rarity}" style="font-size:9px;font-family:'Orbitron',monospace">${item.rarity.toUpperCase()}</span>
        </div>
        <div class="item-qty">x${slot.qty}</div>
      </div>`;
    });
    html+=`</div>`;
  });
  if(html===`<div style="font-size:13px;color:var(--text3);margin-bottom:12px;font-family:'Rajdhani',sans-serif">💎 Gold: <span style="color:var(--gold2)">${p.gold}</span></div>`) html+=`<div class="empty-state">🎒 Inventory kosong.</div>`;
  el.innerHTML=html;
}

function openItem(id) {
  const p=G.player;
  const matCount=p.materials?.[id];
  let slot=p.inventory?.find(s=>s.id===id);
  if(!slot && matCount!==undefined) slot={id,qty:matCount};
  if(!slot) return;
  const item=ITEMS[id]; if(!item) return;
  const eq=(p.equipped?.weapon===id||p.equipped?.armor===id);
  document.getElementById('modal-item-name').textContent=item.icon+' '+item.name;
  let body=`<p style="color:var(--text3);font-size:13px;margin-bottom:10px">${item.desc}</p>`;
  body+=`<p style="font-size:11px;margin-bottom:10px"><span class="rarity-${item.rarity}" style="font-family:'Orbitron',monospace;font-size:10px">${item.rarity.toUpperCase()}</span> • Qty: ${slot.qty}</p>`;
  if(item.stat) body+=`<p style="font-size:12px;color:var(--green2);margin-bottom:10px;font-family:'Orbitron',monospace">${Object.entries(item.stat).map(([k,v])=>`${k.toUpperCase()}+${v}`).join(' | ')}</p>`;
  if(item.effect?.hp||item.effect?.mp) body+=`<p style="font-size:12px;color:var(--cyan2);margin-bottom:12px;font-family:'Orbitron',monospace">${item.effect.hp?`HP+${item.effect.hp} `:''} ${item.effect.mp?`MP+${item.effect.mp}`:''}</p>`;
  if(item.type==='consumable') body+=`<button class="btn" onclick="useItem('${id}');closeModal('item-modal')">🧪 Gunakan</button>`;
  else if(item.type==='weapon') body+=`<button class="btn ${eq?'secondary':''}" onclick="equipItem('${id}','weapon');closeModal('item-modal')">${eq?'✓ Equipped':'⚔️ Equip'}</button>`;
  else if(item.type==='armor') body+=`<button class="btn ${eq?'secondary':''}" onclick="equipItem('${id}','armor');closeModal('item-modal')">${eq?'✓ Equipped':'🛡️ Equip'}</button>`;
  if(item.sell&&item.type!=='key') body+=`<button class="btn secondary" style="margin-top:6px" onclick="sellItem('${id}');closeModal('item-modal')">💎 Jual (${item.sell} Gold)</button>`;
  document.getElementById('modal-item-body').innerHTML=body;
  document.getElementById('item-modal').classList.add('open');
}

function useItem(id) {
  const p=G.player;
  const slot=p.inventory?.find(s=>s.id===id);
  if(!slot||slot.qty<=0) { showToast('Item habis!'); return; }
  const item=ITEMS[id];
  if(item.effect?.hp) { p.hp=Math.min(p.maxHp,p.hp+item.effect.hp); showToast(`❤️ HP +${item.effect.hp}`); }
  if(item.effect?.mp) { p.mp=Math.min(p.maxMp,p.mp+item.effect.mp); showToast(`💧 MP +${item.effect.mp}`); }
  slot.qty--;
  if(slot.qty<=0) p.inventory=p.inventory.filter(s=>s!==slot);
  updateHUD(); renderInventory();
}

function equipItem(id, slot) {
  G.player.equipped[slot]=id;
  showToast(`✓ ${ITEMS[id].name} equipped!`);
  updateHUD(); renderInventory(); renderStatus();
}

function sellItem(id) {
  const p=G.player;
  const slot=p.inventory?.find(s=>s.id===id);
  if(!slot) return;
  p.gold+=ITEMS[id].sell;
  slot.qty--;
  if(slot.qty<=0) p.inventory=p.inventory.filter(s=>s!==slot);
  showToast(`💎 +${ITEMS[id].sell} Gold`);
  updateHUD(); renderInventory();
}

function addItem(id,qty) {
  const p=G.player;
  const item=ITEMS[id]; if(!item) return;
  if(item.type==='material') { p.materials=p.materials||{}; p.materials[id]=(p.materials[id]||0)+qty; }
  else {
    const ex=p.inventory?.find(s=>s.id===id);
    if(ex) ex.qty+=qty; else p.inventory.push({id,qty});
  }
  document.getElementById('inv-dot').style.display='block';
  setTimeout(()=>{ if(G.tab!=='inventory') document.getElementById('inv-dot').style.display='none'; },4000);
  checkStarUpgrade();
}

function addMat(id,qty) { addItem(id,qty); }

// ============================================================
// ROMANCE TAB
// ============================================================
function npcAvatar(npc, size=48) {
  return `<div style="width:${size}px;height:${size}px;border-radius:50%;background:linear-gradient(135deg,${npc.color}22,${npc.color}55);border:2px solid ${npc.color};display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-weight:900;font-size:${Math.floor(size*0.35)}px;color:${npc.color};flex-shrink:0;box-shadow:0 0 12px ${npc.color}33">${npc.initial}</div>`;
}

function renderRomance() {
  const el=document.getElementById('tab-romance-content');
  const pg = G.player?.gender||'m';

  const getStatus=(v, npc)=>{
    const sameGender = npc.gender === pg;
    if(sameGender) return v>=60?'🤝 Sahabat':v>=30?'👊 Partner':'👤 Kenalan';
    return v>=80?'💖 Kekasih':v>=50?'💕 Dekat':v>=20?'🤝 Teman':'👤 Asing';
  };
  const getBarColor=(npc)=> npc.gender===pg ? '#34d399' : npc.color;

  el.innerHTML=`
    <p style="font-size:12px;color:var(--text3);margin-bottom:16px;font-style:italic;font-family:'Rajdhani',sans-serif">
      Pilihan dialogmu menentukan hubungan. Tiap karakter punya ending tersendiri.
    </p>
    ${NPCS.map(npc=>{
      const sameGender = npc.gender === pg;
      const affinity = G.romanceFlags[npc.id]||0;
      const status = getStatus(affinity, npc);
      const barColor = getBarColor(npc);
      return `
      <div class="npc-card" style="border-color:${npc.color}44">
        ${npcAvatar(npc, 52)}
        <div class="npc-data">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:2px">
            <div class="npc-name-r" style="color:${npc.color}">${npc.name}</div>
            <span style="font-size:9px;padding:1px 6px;border-radius:10px;background:${sameGender?'rgba(52,211,153,0.15)':'rgba(219,39,119,0.15)'};color:${sameGender?'#34d399':'#f472b6'};font-family:'Orbitron',monospace">${sameGender?'FRIEND ROUTE':'ROMANCE'}</span>
          </div>
          <div class="npc-role">${npc.role}</div>
          <div class="affinity-bar" style="border-color:${npc.color}33">
            <div class="affinity-fill" style="width:${Math.min(100,affinity)}%;background:linear-gradient(to right,${barColor}88,${barColor})"></div>
          </div>
          <div class="affinity-status">${status} — ${affinity}/100</div>
        </div>
      </div>
      <p style="font-size:11px;color:var(--text3);font-style:italic;margin:-8px 0 14px 6px">"${npc.desc}"</p>
    `}).join('')}
    <div class="stats-title">AFFINITY TIPS</div>
    <p style="font-size:12px;color:var(--text3);line-height:1.9;font-family:'Rajdhani',sans-serif">
      • Dialog bertanda 💕 menaikkan affinity<br>
      • Same gender → Friend Route (max: Sahabat)<br>
      • Opposite gender → Romance Route (max: Kekasih 💖)<br>
      • Affinity 80+ membuka ending eksklusif tiap karakter<br>
      • Karakter affinity tertinggi dapat ending bersama
    </p>
  `;
}

// ============================================================
// AUDIO MANAGER
// ============================================================
let currentBGM = null;
let isMuted = false;
let audioUnlocked = false;

function unlockAudio() {
  if (audioUnlocked) return;
  audioUnlocked = true;
  // Play & immediately pause all tracks to unlock audio context on mobile
  ['bgm-menu','bgm-dungeon','bgm-combat','bgm-boss'].forEach(id => {
    const a = document.getElementById(id);
    if (!a) return;
    a.volume = 0;
    a.play().then(() => a.pause()).catch(() => {});
    a.volume = 0.4;
  });
}

function playBGM(id, volume = 0.4) {
  unlockAudio();
  if (currentBGM && currentBGM.id === id && !currentBGM.paused) return; // already playing
  if (currentBGM) {
    currentBGM.pause();
    currentBGM.currentTime = 0;
  }
  const audio = document.getElementById(id);
  if (!audio) return;
  audio.volume = isMuted ? 0 : volume;
  audio.play().catch(() => {});
  currentBGM = audio;
  currentBGM._targetVolume = volume;
}

function stopBGM() {
  if (currentBGM) {
    currentBGM.pause();
    currentBGM.currentTime = 0;
    currentBGM = null;
  }
}

function toggleMute() {
  isMuted = !isMuted;
  const btn = document.getElementById('tab-mute');
  if (currentBGM) currentBGM.volume = isMuted ? 0 : (currentBGM._targetVolume || 0.4);
  if (btn) btn.textContent = isMuted ? '🔇' : '🔊';
  showToast(isMuted ? '🔇 Music OFF' : '🔊 Music ON');
}

// ============================================================
// UTILS
// ============================================================
function showScreen(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById('screen-'+id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
let toastTimer;
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}

// Particles
function initParticles() {
  const c=document.getElementById('particles');
  for(let i=0;i<15;i++) {
    const p=document.createElement('div'); p.className='particle';
    p.style.cssText=`left:${Math.random()*100}%;animation-duration:${3+Math.random()*5}s;animation-delay:${Math.random()*5}s;height:${10+Math.random()*30}px`;
    c.appendChild(p);
  }
}

document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));
// Unlock audio on first touch (mobile autoplay policy)
document.addEventListener('touchstart', unlockAudio, { once: true });
document.addEventListener('click', unlockAudio, { once: true });
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
initParticles();
</script>
